---
# =============================================================================
# Play 1: Deploy Vault via Helm on the k3s master node
# =============================================================================
- name: Deploy HashiCorp Vault to K3s
  hosts: k3s_servers
  become: false
  vars:
    vault_namespace: vault
    vault_chart_version: "0.28.0"
    kube_config: "/etc/rancher/k3s/k3s.yaml"
  environment:
    KUBECONFIG: "{{ kube_config }}"
  run_once: true  # Moved here — applies to all tasks in this play

  tasks:
    - name: Add HashiCorp Helm repository
      kubernetes.core.helm_repository:
        name: hashicorp
        repo_url: "https://helm.releases.hashicorp.com"

    - name: Create Vault namespace
      kubernetes.core.k8s:
        name: "{{ vault_namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    - name: Deploy Vault via Helm
      kubernetes.core.helm:
        name: vault
        chart_ref: hashicorp/vault
        chart_version: "{{ vault_chart_version }}"
        release_namespace: "{{ vault_namespace }}"
        create_namespace: true
        values:
          server:
            # dev:
            #   enabled: true
            dataStorage:
              enabled: true
              size: 5Gi
          injector:
            enabled: true
          ui:
            enabled: true
            # serviceType: LoadBalancer #go through cilium gateway

    - name: Wait for vault-0 pod to be Running
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ vault_namespace }}"
        name: vault-0
      register: vault_pod_info
      until:
        - vault_pod_info.resources | length > 0
        - vault_pod_info.resources[0].status.phase == "Running"
      retries: 20
      delay: 10


    

# =============================================================================
# Play 2: Initialize and unseal Vault — runs ON the k3s master node
# =============================================================================
- name: Initialize and Unseal Vault
  hosts: k3s_servers
  become: false
  run_once: true
  vars:
    vault_namespace: vault
    vault_pod: vault-0
    kube_config: "/etc/rancher/k3s/k3s.yaml"
    remote_key_path: "/tmp/hc-vault_keys.json"  # Temporary staging path on master
  environment:
    KUBECONFIG: "{{ kube_config }}"

  tasks:
    - name: Check current Vault status
      ansible.builtin.command:
        cmd: kubectl exec -n {{ vault_namespace }} {{ vault_pod }} -- vault status -format=json
      register: vault_status_raw
      # Exit code 2 = sealed-but-reachable, which is fine here
      failed_when: vault_status_raw.rc not in [0, 2]
      changed_when: false

    - name: Parse Vault status
      ansible.builtin.set_fact:
        vault_info: "{{ vault_status_raw.stdout | from_json }}"

    - name: Initialize Vault (only if not already initialized)
      ansible.builtin.command:
        cmd: >
          kubectl exec -n {{ vault_namespace }} {{ vault_pod }} --
          vault operator init -key-shares=1 -key-threshold=1 -format=json
      register: vault_init_raw
      when: not vault_info.initialized

    - name: Parse and stage init credentials to remote temp file
      ansible.builtin.copy:
        content: "{{ vault_init_raw.stdout | from_json | to_nice_json }}"
        dest: "{{ remote_key_path }}"
        mode: "0600"
      when: not vault_info.initialized
      
    - name: Extract Unseal Key
      set_fact:
        unseal_key: "{{ (vault_init_raw.stdout | from_json).unseal_keys_b64[0] }}"
      when: not vault_info.initialized

    - name: Unseal Vault
      ansible.builtin.command:
        cmd: >
          kubectl exec -n {{ vault_namespace }} {{ vault_pod }} --
          vault operator unseal {{ unseal_key }}
      when: not vault_info.initialized or vault_info.sealed
      no_log: true

# =============================================================================
# Play 3: Fetch keys from master node to workstation, then encrypt locally
# =============================================================================
- name: Fetch and Encrypt Vault Keys on Workstation
  hosts: k3s_servers
  become: false
  run_once: true

  vars:
    remote_key_path: "/tmp/hc-vault_keys.json"
    # Use lookup('env','HOME') so ~ is always expanded correctly on the
    # workstation, regardless of whether the task delegates to localhost.
    local_key_path: "{{ lookup('env', 'HOME') }}/Scripts/home-lab-infra/ansible/vars/hc-vault_keys.json"
    vault_password_file: "{{ lookup('env', 'HOME') }}/Scripts/home-lab-infra/ansible/vars/.vault_key"
    k8s_ca_cert_cmd: >
      kubectl get configmap kube-root-ca.crt -n kube-system
      -o jsonpath='{.data.ca\.crt}'
    k8s_sa_jwt_cmd: >
      kubectl exec -n {{ vault_namespace }} vault-0 --
      cat /var/run/secrets/kubernetes.io/serviceaccount/token
    k8s_host_cmd: >
      kubectl config view --raw
      -o jsonpath='{.clusters[0].cluster.server}'
    vault_addr: "http://vault.vault.svc.cluster.local:8200"
    gitlab_url: "{{gitlab_url}}"
    vault_namespace: vault
    vault_token: "{{root_token}}"
    kube_config: /etc/rancher/k3s/k3s.yaml

  tasks:
    - name: Check if staging file exists on master
      ansible.builtin.stat:
        path: "{{ remote_key_path }}"
      register: remote_keys_stat

    - name: Fetch keys file from master to workstation
      ansible.builtin.fetch:
        src: "{{ remote_key_path }}"
        dest: "{{ local_key_path }}"
        flat: true  # Write directly to local_key_path — no hostname subdirectory
      when: remote_keys_stat.stat.exists

    - name: Remove staging file from master node
      ansible.builtin.file:
        path: "{{ remote_key_path }}"
        state: absent
      when: remote_keys_stat.stat.exists

    # Everything below runs on the workstation (localhost)
    - name: Ensure local keys directory exists
      ansible.builtin.file:
        path: "{{ local_key_path | dirname }}"
        state: directory
        mode: "0700"
      delegate_to: localhost

    - name: Check that the password file exists on workstation
      ansible.builtin.stat:
        path: "{{ vault_password_file }}"
      delegate_to: localhost
      register: pass_file

    - name: Fail if password file is missing
      ansible.builtin.fail:
        msg: "Create a password file at {{ vault_password_file }} before running this playbook."
      when: not pass_file.stat.exists
      delegate_to: localhost

    - name: Check if keys file is already Ansible-Vault encrypted
      ansible.builtin.shell:
        # grep -q returns rc=0 if the vault header is found (already encrypted)
        cmd: "head -1 {{ local_key_path }} | grep -q '$ANSIBLE_VAULT'"
      register: already_encrypted
      failed_when: false
      changed_when: false
      delegate_to: localhost

    - name: Encrypt keys file with Ansible Vault (idempotent)
      ansible.builtin.command:
        argv:
          - ansible-vault
          - encrypt
          - "{{ local_key_path }}"        # fully expanded — no shell, no tilde
          - --vault-password-file
          - "{{ vault_password_file }}"   # fully expanded — no shell, no tilde
      when: already_encrypted.rc != 0  # rc=1 → header not found → not yet encrypted
      delegate_to: localhost

    - name: Confirm encryption complete
      ansible.builtin.debug:
        msg: "Vault keys at {{ local_key_path }} are encrypted and stored safely."
      delegate_to: localhost


    # -------------------------------------------------------------------------
    # Enable kubernetes auth method on the vault.
    # Gather K8s auth material from the live cluster
    # -------------------------------------------------------------------------
    - name: Fetch cluster CA certificate
      ansible.builtin.command:
        argv: ["bash", "-c", "{{ k8s_ca_cert_cmd }}"]
      register: k8s_ca_cert
      changed_when: false
      no_log: true
 
    - name: Fetch Vault pod service account JWT
      ansible.builtin.command:
        argv: ["bash", "-c", "{{ k8s_sa_jwt_cmd }}"]
      register: k8s_sa_jwt
      changed_when: false
      no_log: true
 
    - name: Fetch Kubernetes API server address
      ansible.builtin.command:
        argv: ["bash", "-c", "{{ k8s_host_cmd }}"]
      register: k8s_host
      changed_when: false



    # -------------------------------------------------------------------------
    # Enable and configure Kubernetes auth method
    # vault_auth_method removed in community.hashi_vault 7.x — use kubectl exec
    # -------------------------------------------------------------------------
    - name: Enable Kubernetes auth method in Vault
      ansible.builtin.command:
        argv:
          - kubectl
          - exec
          - -n
          - "{{ vault_namespace }}"
          - vault-0
          - --
          - /bin/sh
          - -c
          - "VAULT_TOKEN={{ vault_token }} vault auth enable kubernetes"
      environment:
        VAULT_TOKEN: "{{ vault_token }}"
        KUBECONFIG: "{{ kube_config }}"
      register: auth_enable
      # rc=2 means already enabled — that's fine
      failed_when: auth_enable.rc not in [0, 2]
      changed_when: auth_enable.rc == 0
      no_log: true

    - name: Configure Kubernetes auth backend with cluster details
      ansible.builtin.command:
        argv:
          - kubectl
          - exec
          - -n
          - "{{ vault_namespace }}"
          - vault-0
          - --
          - /bin/sh
          - -c
          - "VAULT_TOKEN={{ vault_token }}" 
          - vault
          - write
          - auth/kubernetes/config
          - "kubernetes_host={{ k8s_host.stdout }}"
          - "kubernetes_ca_cert={{ k8s_ca_cert.stdout }}"
          - "token_reviewer_jwt={{ k8s_sa_jwt.stdout }}"
      environment:
        VAULT_TOKEN: "{{ vault_token }}"
        KUBECONFIG: "{{ kube_config }}"
      no_log: true