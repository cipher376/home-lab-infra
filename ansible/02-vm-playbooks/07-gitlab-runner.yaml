---
- name: "Install and Configure Gitlab Runner on K3s Cluster (Master + Workers)"
  hosts: k3s_servers
  become: true
  vars:
    k3s_version: "stable"
    k3s_master_ip: "172.16.0.103"
    k3s_token_file: "/var/lib/rancher/k3s/server/node-token"
    pod_cidr: "10.244.0.0/16"
    service_cidr: "10.96.0.0/12"
    cilium_version: "1.15.5"
    cilium_lb_ip_range: "172.16.0.200-172.16.0.250"
    k3s_workers:
      - name: "ml-gpu-worker-legion"
        ip: "172.16.0.101"
        labels:
          - "node-role.kubernetes.io/gpu-worker=true"
          - "hardware=gpu"
          - "nvidia.com/gpu=true"
      - name: "k3s-worker-prodesk"
        ip: "172.16.0.104"
        labels:
          - "node-role.kubernetes.io/gitlab=true"
          - "app=gitlab"
    gitlab_runner_token: "{{gitlab_runner_token}}" #encrypted in vault
    gitlab_url: "{{gitlab_url}}" #Gitlab server IP
    vault_namespace: vault
    kube_config: "/etc/rancher/k3s/k3s.yaml"
    vault_addr: "http://vault.vault.svc.cluster.local:8200"
    vault_token: "{{ root_token }}"
    runner_namespace: gitlab-runner
    runner_sa: gitlab-runner
    runner_role_name: gitlab-runner-role
    runner_policy_name: gitlab-runner-policy
    runner_secret_path: gitlab-runner/registration
  tasks:
    # ------------------------------------------------------------------ #
    #  GITLAB RUNNER SETUP                                                #
    # ------------------------------------------------------------------ #
    - name: Validate GitLab Runner token
      assert:
        that:
          - gitlab_runner_token is defined
          - gitlab_runner_token | length > 0
          - gitlab_runner_token != ''
        fail_msg: "GITLAB_RUNNER_TOKEN is empty!"
        success_msg: "GitLab Runner token validated"
      run_once: true

    - name: Check if Helm is installed
      command: which helm
      register: helm_check
      failed_when: false
      changed_when: false
      delegate_to: k3s-master-venue 
      run_once: true

    - name: Install Helm if not present
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: helm_check.rc != 0
      delegate_to: k3s-master-venue 
      run_once: true

    - name: Add GitLab Helm repository
      command: helm repo add gitlab https://charts.gitlab.io
      delegate_to: k3s-master-venue 
      run_once: true
      register: helm_repo_add
      failed_when: false
      changed_when: "'has been added' in helm_repo_add.stdout"

    - name: Update Helm repositories
      command: helm repo update
      delegate_to: k3s-master-venue 
      run_once: true

    - name: Create GitLab Runner namespace
      command: kubectl create namespace gitlab-runner
      delegate_to: k3s-master-venue 
      run_once: true
      register: namespace_create
      failed_when: false
      changed_when: "'created' in namespace_create.stdout"

    - name: Create GitLab Runner values file
      copy:
        dest: /tmp/gitlab-runner-values.yaml
        mode: '0644'
        content: |
          gitlabUrl: {{ gitlab_url }}
          # Use runnerToken for glrt- style tokens (Recommended)
          runnerToken: "{{ gitlab_runner_token }}"

          rbac:
            create: true

          runners:
            config: |
              [[runners]]
                request_concurrency = 2
                [runners.kubernetes]
                  namespace = "gitlab-runner"
                  image = "pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime"
                  privileged = true
                  cpu_limit = "4"
                  memory_limit = "8Gi"
                  service_account = "gitlab-runner"

                # 1. Hardware Targeting: Ensure jobs land on the gpu-worker node with NVIDIA GPUs
                [[runners.kubernetes.node_selector]]
                  hardware = "gpu"

                # 2. Bypassing the Taint you put on the Legion node
                [[runners.kubernetes.tolerations]]
                  key = "dedicated"
                  operator = "Equal"
                  value = "gpu"
                  effect = "NoSchedule"

                # 3. Resource Requests: Crucial for the NVIDIA device plugin to trigger GPU allocation
                [runners.kubernetes.pod_annotations]
                  "nvidia.com/gpu" = "1"

                # 4. NVIDIA Runtime: Tells K3s to use the nvidia container runtime
                [[runners.kubernetes.volumes.host_path]]
                  name = "nvidia-libs"
                  mount_path = "/usr/local/nvidia"
                  read_only = true
                  host_path = "/lib/x86_64-linux-gnu"
                
                # 5. Local Cache: High-speed scratch space for Unsloth / HuggingFace
                [[runners.kubernetes.volumes.empty_dir]]
                  name = "model-cache"
                  mount_path = "/root/.cache/huggingface"
                  host_path = "/mnt/training-cache/.cache" # Use your NFS path here
                  #medium = "Memory" # Or remove this line to use Disk if 8GB RAM is tight
                
                [[runners.kubernetes.volumes.host_path]]
                  name = "nfs-checkpoints"
                  mount_path = "/models/checkpoints" # Path inside the Pod
                  host_path = "/mnt/training-cache/checkpoints" # Actual path on your Legion node
                  read_only = false
                        
            resources:
              limits:
                memory: 512Mi
                cpu: 500m
              requests:
                memory: 128Mi
                cpu: 100m
      delegate_to: k3s-master-venue
      run_once: true

    - name: Check if GitLab Runner is already installed
      command: helm list -n gitlab-runner -o json
      register: helm_list
      delegate_to: k3s-master-venue 
      become: true
      run_once: true
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Delete GitLab Runner namespace if it exists
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: gitlab-runner
        # Wait ensures the namespace is fully purged from the API
        wait: yes
        wait_timeout: 300 # 5 minutes for heavy cleanup
      delegate_to: k3s-master-venue
      run_once: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Install or upgrade GitLab Runner via Helm
      kubernetes.core.helm:
        name: gitlab-runner
        chart_ref: gitlab/gitlab-runner
        release_namespace: gitlab-runner
        create_namespace: true
        values_files:
          - /tmp/gitlab-runner-values.yaml
        wait: yes
        timeout: 300s
      register: runner_install
      delegate_to: k3s-master-venue
      become: true
      run_once: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display GitLab Runner installation status
      debug:
        msg: "{{ runner_install.stdout_lines }}"

    - name: Wait for GitLab Runner pod to be ready
      command: kubectl wait --for=condition=ready pod -l app=gitlab-runner -n gitlab-runner --timeout=300s
      delegate_to: k3s-master-venue 
      run_once: true
      register: runner_ready
      retries: 3
      delay: 10
      until: runner_ready.rc == 0

    - name: Get GitLab Runner pod status
      command: kubectl get pods -n gitlab-runner -o wide
      register: runner_pods
      delegate_to: k3s-master-venue 
      run_once: true

    - name: Display GitLab Runner pod status
      debug:
        msg: "{{ runner_pods.stdout_lines }}"

    - name: Verify runner registration
      command: kubectl logs -n gitlab-runner -l app=gitlab-runner --tail=50
      register: runner_logs
      delegate_to: k3s-master-venue 
      run_once: true

    - name: Display runner logs
      debug:
        msg: "{{ runner_logs.stdout_lines }}"

    - name: Create info message
      debug:
        msg: |
          ============================================
          GitLab Runner Installation Complete!
          ============================================
          Namespace: gitlab-runner
          GitLab URL: {{ gitlab_url }}
          Node Selector: nvidia.com/gpu=true
          
          To verify:
            kubectl get pods -n gitlab-runner
            kubectl logs -n gitlab-runner -l app=gitlab-runner
          
          To uninstall:
            helm uninstall gitlab-runner -n gitlab-runner
          ============================================
      run_once: true



# =============================================================================
# Play: Configure Vault for GitLab Runner
# Assumes Play 1 (Load Vault Credentials) from configure_vault_argocd.yml
# has already run and vault_credential_store is in memory.
# Run this as a standalone play or append to configure_vault_argocd.yml
# =============================================================================
    - name: Write GitLab Runner policy to temp file on vault-0
      ansible.builtin.shell:
        cmd: |
          kubectl exec -n {{ vault_namespace }} vault-0 -- \
            /bin/sh -c 'cat > /tmp/runner-policy.hcl << '"'"'EOF'"'"'
          path "secret/data/gitlab-runner/registration" {
            capabilities = ["read"]
          }
          path "auth/token/renew-self" {
            capabilities = ["update"]
          }
          path "auth/token/lookup-self" {
            capabilities = ["read"]
          }
          EOF'
      no_log: true
      delegate_to: k3s-master-venue 
      run_once: true

    - name: Apply GitLab Runner policy
      ansible.builtin.command:
        argv:
          - kubectl
          - exec
          - -n
          - "{{ vault_namespace }}"
          - vault-0
          - --
          - /bin/sh
          - -c
          - "VAULT_TOKEN={{ vault_token }}"
          - vault 
          - policy 
          - write 
          - "{{ runner_policy_name }}"
          -  /tmp/runner-policy.hcl
      no_log: true
      delegate_to: k3s-master-venue 
      run_once: true
 
    - name: Remove policy temp file from vault-0
      ansible.builtin.command:
        argv:
          - kubectl
          - exec
          - -n
          - "{{ vault_namespace }}"
          - vault-0
          - --
          - /bin/sh
          - -c
          - "VAULT_TOKEN={{ vault_token }}"
          - rm
          - -f
          - /tmp/runner-policy.hcl
      changed_when: false
      delegate_to: k3s-master-venue 
      run_once: true
 
    # -------------------------------------------------------------------------
    # K8s auth role
    # -------------------------------------------------------------------------
    - name: Create Kubernetes auth role for GitLab Runner
      ansible.builtin.command:
        argv:
          - kubectl
          - exec
          - -n
          - "{{ vault_namespace }}"
          - vault-0
          - --
          - /bin/sh
          - -c
          - "VAULT_TOKEN={{ vault_token }}"
          - vault 
          - write 
          - auth/kubernetes/role/{{ runner_role_name }}
          - bound_service_account_names={{ runner_sa }}
          - bound_service_account_namespaces={{ runner_namespace }}
          - policies={{ runner_policy_name }}
          - ttl=1h
          - max_ttl=24h
      no_log: true
      delegate_to: k3s-master-venue 
      run_once: true
 
    # -------------------------------------------------------------------------
    # Seed registration token
    # -------------------------------------------------------------------------
    - name: Check if GitLab secret already exists
      ansible.builtin.shell:
        cmd: "kubectl exec -n {{ vault_namespace }} vault-0 -- /bin/sh -c 'VAULT_TOKEN={{ vault_token }} vault kv get secret/{{runner_secret_path}}'"
      register: vault_check
      failed_when: false
      changed_when: false
      no_log: true

    - name: Write GitLab group token into Vault KV
      ansible.builtin.command:
        argv:
          - kubectl 
          - exec 
          - -n 
          - "{{ vault_namespace }}"
          - vault-0 
          - -- 
          - /bin/sh 
          - -c 
          - "VAULT_TOKEN={{ vault_token }}" 
          - vault 
          - kv 
          - put 
          - "-mount=secret {{runner_secret_path}}" 
          - "url={{ gitlab_url }}" 
          - "token={{gitlab_runner_token}}"
      no_log: true
      run_once: true



    # -------------------------------------------------------------------------
    # Verify
    # -------------------------------------------------------------------------
    - name: Verify GitLab Runner role was created
      ansible.builtin.command:
        argv:
          - kubectl
          - exec
          - -n
          - "{{ vault_namespace }}"
          - vault-0
          - --
          - /bin/sh
          - -c
          - "VAULT_TOKEN={{ vault_token }}"
          - vault 
          - read 
          - auth/kubernetes/role/{{ runner_role_name }}"
      register: role_check
      changed_when: false
      failed_when: role_check.rc != 0
      no_log: true
      delegate_to: k3s-master-venue 
      run_once: true
 
    - name: Verify registration token was seeded in Vault KV
      ansible.builtin.command:
        argv:
          - kubectl
          - exec
          - -n
          - "{{ vault_namespace }}"
          - vault-0
          - --
          - /bin/sh
          - -c
          - "VAULT_TOKEN={{ vault_token }}" 
          - vault 
          - kv 
          - get 
          - -mount=secret {{ runner_secret_path }}"
      register: kv_check
      changed_when: false
      failed_when: kv_check.rc != 0
      no_log: true
      delegate_to: k3s-master-venue 
      run_once: true
 
    - name: Report GitLab Runner Vault configuration
      ansible.builtin.debug:
        msg:
          - "Policy '{{ runner_policy_name }}': created"
          - "Role '{{ runner_role_name }}': bound to {{ runner_sa }} in {{ runner_namespace }}"
          - "Registration token seeded at: secret/data/{{ runner_secret_path }}"