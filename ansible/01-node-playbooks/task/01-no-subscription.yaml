---
    - name: Remove PVE enterprise repository (new .sources format)
      file:
        path: /etc/apt/sources.list.d/pve-enterprise.sources
        state: absent

    - name: Remove Ceph enterprise repository (new .sources format)
      file:
        path: /etc/apt/sources.list.d/ceph.sources
        state: absent

    - name: Remove legacy enterprise .list files if present (upgraded from PVE 8)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/pve-enterprise.list
        - /etc/apt/sources.list.d/ceph.list

    - name: Verify Proxmox archive keyring exists
      stat:
        path: /usr/share/keyrings/proxmox-archive-keyring.gpg
      register: keyring_check

    - name: Download Proxmox archive keyring if missing
      get_url:
        url: https://enterprise.proxmox.com/debian/proxmox-archive-keyring-trixie.gpg
        dest: /usr/share/keyrings/proxmox-archive-keyring.gpg
        mode: '0644'
      when: not keyring_check.stat.exists

    - name: Configure PVE no-subscription repository
      copy:
        dest: /etc/apt/sources.list.d/pve-no-sub.sources
        mode: '0644'
        content: |
          Types: deb
          URIs: http://download.proxmox.com/debian/pve
          Suites: trixie
          Components: pve-no-subscription
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg

    - name: Configure Ceph no-subscription repository
      copy:
        dest: /etc/apt/sources.list.d/ceph-no-sub.sources
        mode: '0644'
        content: |
          Types: deb
          URIs: http://download.proxmox.com/debian/ceph-squid
          Suites: trixie
          Components: no-subscription
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 0
      register: apt_update
      failed_when: apt_update.failed is defined and apt_update.failed

    - name: Verify no enterprise repos remain active
      shell: grep -r "enterprise.proxmox.com" /etc/apt/sources.list.d/ || true
      register: enterprise_check
      changed_when: false

    - name: Warn if enterprise repo entries still present
      debug:
        msg: >
          WARNING: enterprise.proxmox.com still referenced in
          {{ enterprise_check.stdout_lines }}.
          These will cause 401 errors on apt update without a subscription.
      when: enterprise_check.stdout | length > 0

    - name: Confirm active repositories
      shell: grep -rh "URIs\|Components" /etc/apt/sources.list.d/*.sources
      register: active_repos
      changed_when: false

    - name: Display active repositories
      debug:
        msg: "{{ active_repos.stdout_lines }}"