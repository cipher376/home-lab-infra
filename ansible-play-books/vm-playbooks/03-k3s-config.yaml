---
- name: "Install and Configure K3s Cluster (Master + Workers)"
  hosts: k3s_servers
  become: true
  vars:
    k3s_version: "stable"
    k3s_master_ip: "172.16.0.103"
    k3s_token_file: "/var/lib/rancher/k3s/server/node-token"
    pod_cidr: "10.244.0.0/16"
    service_cidr: "10.96.0.0/12"
    cilium_version: "1.15.5"
    cilium_lb_ip_range: "172.16.0.200-172.16.0.250"
    gpu_taint_key: "dedicated"
    gpu_taint_value: "gpu"
    gpu_taint_effect: "NoSchedule"

    k3s_workers:
      - name: "ml-gpu-worker-legion"
        ip: "172.16.0.101"
        labels:
          - "node-role.kubernetes.io/gpu-worker=true"
          - "hardware=gpu"
          - "nvidia.com/gpu=true"
      - name: "k3s-worker-prodesk"
        ip: "172.16.0.104"
        labels:
          - "node-role.kubernetes.io/gitlab=true"
          - "app=gitlab"
    gitlab_runner_token: "{{ lookup('env', 'GITLAB_RUNNER_TOKEN') }}"
  tasks:
    
    - name: Wait for cloud-init to finish
      command: cloud-init status --wait
      changed_when: false
      failed_when: false

    - name: Wait for unattended-upgrades to finish
      shell: |
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock 2>/dev/null; do
          echo "Waiting for apt lock to be released..."
          sleep 5
        done
        echo "Lock released"
      changed_when: false
      timeout: 300

# ------------------------------------------------------------------ #
#  SECTION 1 — SYSTEM PREPARATION (ALL NODES)                          #
# ------------------------------------------------------------------ #

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - git
          - apt-transport-https
          - ca-certificates
          - gnupg
          - open-iscsi
          - nfs-common
          - jq
          - unzip
        state: present

    - name: Enable and start open-iscsi
      systemd:
        name: iscsid
        enabled: yes
        state: started

    - name: Disable swap
      command: swapoff -a
      changed_when: false

    - name: Remove swap from fstab
      lineinfile:
        path: /etc/fstab
        regexp: '.*swap.*'
        state: absent

    - name: Load required kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules
      copy:
        dest: /etc/modules-load.d/k3s.conf
        mode: '0644'
        content: |
          overlay
          br_netfilter

    - name: Configure sysctl for Kubernetes networking
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { key: "net.ipv4.ip_forward",                 value: "1" }

    - name: Ensure Python kubernetes library is installed on the Master
      ansible.builtin.package:
        name: python3-kubernetes
        state: present
      become: true
      delegate_to: k3s-master-venue
      run_once: true

# ------------------------------------------------------------------ #
#  SECTION 2 — K3s MASTER INSTALLATION                                 #
# ------------------------------------------------------------------ #

    - name: Check if K3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Download K3s install script
      get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0755'
      when: not k3s_binary.stat.exists

    - name: Install K3s master node without default CNI
      shell: |
        INSTALL_K3S_CHANNEL={{ k3s_version }} \
        INSTALL_K3S_EXEC="server \
          --cluster-init \
          --bind-address={{ k3s_master_ip }} \
          --advertise-address={{ k3s_master_ip }} \
          --node-ip={{ k3s_master_ip }} \
          --cluster-cidr={{ pod_cidr }} \
          --service-cidr={{ service_cidr }} \
          --disable=traefik \
          --disable=servicelb \
          --disable-network-policy \
          --flannel-backend=none \
          --write-kubeconfig-mode=644" \
        /tmp/k3s-install.sh
        echo "K3s master install complete"
      when:
        - not k3s_binary.stat.exists
        - ansible_host == k3s_master_ip
      register: k3s_master_install
      changed_when: "'K3s master install complete' in k3s_master_install.stdout"

    - name: Display K3s master install result
      debug:
        msg: "{{ k3s_master_install.stdout_lines | default(['K3s master already installed or skipped']) }}"
      when: ansible_host == k3s_master_ip

    - name: Ensure K3s master service is enabled and started
      systemd:
        name: k3s
        enabled: yes
        state: started
      when: ansible_host == k3s_master_ip

    - name: Wait for K3s API server to be available
      wait_for:
        host: "{{ k3s_master_ip }}"
        port: 6443
        timeout: 120
        delay: 10
      when: ansible_host == k3s_master_ip

    - name: Wait for node token to be generated
      wait_for:
        path: "{{ k3s_token_file }}"
        timeout: 120
        delay: 10
      when: ansible_host == k3s_master_ip

    - name: Taint Master Node to prevent general workloads
      kubernetes.core.k8s_taint:
        state: present
        name: "{{ inventory_hostname }}"
        taints:
          - key: "node-role.kubernetes.io/master"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/control-plane"
            effect: "NoSchedule"
      delegate_to: k3s-master-venue
      run_once: true
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

# ------------------------------------------------------------------ #
#  SECTION 3 — KUBECONFIG (MASTER ONLY)                                #
# ------------------------------------------------------------------ #

    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      when: ansible_host == k3s_master_ip

    - name: Copy kubeconfig for ubuntu user
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ubuntu/.kube/config
        remote_src: yes
        owner: ubuntu
        group: ubuntu
        mode: '0600'
      when: ansible_host == k3s_master_ip

    - name: Update kubeconfig server address
      replace:
        path: /home/ubuntu/.kube/config
        regexp: 'https://127.0.0.1:6443'
        replace: "https://{{ k3s_master_ip }}:6443"
      when: ansible_host == k3s_master_ip

    - name: Set KUBECONFIG in ubuntu bashrc
      lineinfile:
        path: /home/ubuntu/.bashrc
        line: 'export KUBECONFIG=/home/ubuntu/.kube/config'
        state: present
      when: ansible_host == k3s_master_ip

    - name: Set KUBECONFIG in ubuntu profile
      lineinfile:
        path: /home/ubuntu/.profile
        line: 'export KUBECONFIG=/home/ubuntu/.kube/config'
        state: present
      when: ansible_host == k3s_master_ip

# ------------------------------------------------------------------ #
#  SECTION 4 — INSTALL HELM (MASTER ONLY)                            #
# ------------------------------------------------------------------ #

    - name: Check if Helm is installed
      command: which helm
      register: helm_check
      failed_when: false
      changed_when: false
      when: ansible_host == k3s_master_ip

    - name: Download Helm install script
      get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get-helm-3.sh
        mode: '0755'
      when:
        - ansible_host == k3s_master_ip
        - helm_check.rc != 0

    - name: Install Helm
      command: /tmp/get-helm-3.sh
      when:
        - ansible_host == k3s_master_ip
        - helm_check.rc != 0
      register: helm_install
      changed_when: helm_install.rc == 0

    - name: Verify Helm version
      command: helm version
      register: helm_version
      changed_when: false
      when: ansible_host == k3s_master_ip

    - name: Display Helm version
      debug:
        msg: "{{ helm_version.stdout_lines }}"
      when: ansible_host == k3s_master_ip

# ------------------------------------------------------------------ #
#  SECTION 5 — INSTALL CILIUM CLI (MASTER ONLY)                        #
# ------------------------------------------------------------------ #

    - name: Check if Cilium CLI is installed
      command: which cilium
      register: cilium_cli_check
      failed_when: false
      changed_when: false
      when: ansible_host == k3s_master_ip

    - name: Download and install Cilium CLI
      shell: |
        CILIUM_CLI_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
        curl -L --remote-name-all \
          https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-amd64.tar.gz
        tar -xzvf cilium-linux-amd64.tar.gz -C /usr/local/bin
        rm cilium-linux-amd64.tar.gz
        echo "Cilium CLI installed"
      args:
        chdir: /tmp
      when:
        - ansible_host == k3s_master_ip
        - cilium_cli_check.rc != 0
      register: cilium_cli_install
      changed_when: "'Cilium CLI installed' in cilium_cli_install.stdout"

# ------------------------------------------------------------------ #
#  SECTION 6 — INSTALL CILIUM CNI (MASTER ONLY)                        #
# ------------------------------------------------------------------ #

    - name: Add Cilium Helm repo
      shell: |
        helm repo add cilium https://helm.cilium.io/
        helm repo update
        echo "Cilium repo added"
      register: cilium_repo
      changed_when: "'Cilium repo added' in cilium_repo.stdout"
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Check if Cilium is already installed
      shell: |
        helm list -n kube-system | grep cilium && echo exists || echo missing
      register: cilium_check
      changed_when: false
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Install Cilium via Helm
      shell: |
        helm install cilium cilium/cilium \
          --version {{ cilium_version }} \
          --namespace kube-system \
          --set operator.replicas=1 \
          --set kubeProxyReplacement=true \
          --set k8sServiceHost={{ k3s_master_ip }} \
          --set k8sServicePort=6443 \
          --set ipam.mode=kubernetes \
          --set ipam.operator.clusterPoolIPv4PodCIDRList={{ pod_cidr }} \
          --set ingressController.enabled=true \
          --set ingressController.loadbalancerMode=shared \
          --set ingressController.service.type=LoadBalancer \
          --set loadBalancer.l7.backend=envoy \
          --set l2announcements.enabled=true \
          --set externalIPs.enabled=true \
          --set socketLB.enabled=true \
          --set hostServices.enabled=true \
          --set nodePort.enabled=true
        echo "Cilium installed"
      when:
        - ansible_host == k3s_master_ip
        - "'missing' in cilium_check.stdout"
      register: cilium_install
      changed_when: "'Cilium installed' in cilium_install.stdout"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for Cilium pods to be ready
      shell: |
        kubectl wait pod \
          --namespace kube-system \
          --selector=k8s-app=cilium \
          --for=condition=ready \
          --timeout=300s
        echo "Cilium pods ready"
      register: cilium_wait
      changed_when: false
      failed_when: false
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display Cilium wait result
      debug:
        msg: "{{ cilium_wait.stdout_lines }}"
      when: ansible_host == k3s_master_ip

# ------------------------------------------------------------------ #
#  SECTION 7 — CILIUM L2 ANNOUNCEMENTS (MASTER ONLY)                   #
# ------------------------------------------------------------------ #

    - name: Apply Cilium L2 announcement policy and IP pool
      copy:
        dest: /tmp/cilium-l2-policy.yaml
        content: |
          apiVersion: "cilium.io/v2alpha1"
          kind: CiliumL2AnnouncementPolicy
          metadata:
            name: homelab-l2-policy
          spec:
            interfaces:
              - eth0
            externalIPs: true
            loadBalancerIPs: true
          ---
          apiVersion: "cilium.io/v2alpha1"
          kind: CiliumLoadBalancerIPPool
          metadata:
            name: homelab-pool
          spec:
            blocks:
              - cidr: "172.16.0.200/27"
      when: ansible_host == k3s_master_ip

    - name: Apply L2 policy
      shell: |
        kubectl apply -f /tmp/cilium-l2-policy.yaml
        echo "L2 policy applied"
      register: l2_apply
      changed_when: "'L2 policy applied' in l2_apply.stdout"
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

# ------------------------------------------------------------------ #
#  SECTION 8 — FETCH TOKEN AND DISTRIBUTE TO WORKERS                   #
# ------------------------------------------------------------------ #

    - name: Read K3s node token from master
      command: "sudo cat {{ k3s_token_file }}"
      register: k3s_token
      changed_when: false
      when: ansible_host == k3s_master_ip

    - name: Save token locally on control machine
      local_action:
        module: copy
        content: "{{ k3s_token.stdout }}"
        dest: "/tmp/k3s-node-token"
        mode: '0600'
      become: false
      when: ansible_host == k3s_master_ip

    - name: Display node token saved location
      debug:
        msg: "K3s node token saved to /tmp/k3s-node-token Token {{k3s_token.stdout}}"
      when: ansible_host == k3s_master_ip

# ------------------------------------------------------------------ #
## ------------------------------------------------------------------ #
# SECTION 10 — K3s WORKER INSTALLATION                                 #
# ------------------------------------------------------------------ #
    - name: Create nvidia-device-plugin namespace
      shell: | 
        kubectl delete namespcace nvidia-device-plugin --ignore-not-found
        kubectl create namespace nvidia-device-plugin --dry-run=client -o yaml | kubectl apply -f -
      delegate_to: k3s-master-venue
      run_once: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Read saved token for worker installation
      set_fact:
        worker_token: "{{ lookup('file', '/tmp/k3s-node-token') | default('dummy-token-for-master') }}"
      when: ansible_host != k3s_master_ip
    
    - name: Validate token is not empty
      assert:
        that:
          - worker_token is defined
          - worker_token | length > 0
        fail_msg: "K3s token is empty or invalid."
      when: ansible_host != k3s_master_ip
    
    - name: Check if K3s agent is already installed on worker
      stat:
        path: /usr/local/bin/k3s
      register: k3s_agent_binary
      when: ansible_host != k3s_master_ip

    - name: Download K3s install script on worker
      get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0755'
      when:
        - ansible_host != k3s_master_ip
        - not (k3s_agent_binary.stat.exists | default(false))

    
    - name: Install K3s agent on worker node
      shell: |
        INSTALL_K3S_CHANNEL={{ k3s_version }} \
        K3S_URL="https://{{ k3s_master_ip }}:6443" \
        K3S_TOKEN="{{ worker_token }}" \
        INSTALL_K3S_EXEC="agent --node-ip={{ ansible_host }}" \
        /tmp/k3s-install.sh 
      when:
        - ansible_host != k3s_master_ip
        - not (k3s_agent_binary.stat.exists | default(false))
      become: true

    
    - name: Restart K3s agent to pick up
      systemd:
        name: k3s-agent
        state: restarted
      when: 
        - ansible_host != k3s_master_ip

# ------------------------------------------------------------------ #
#  SECTION 9 — LABEL WORKER NODES (FROM MASTER)                       #
# ------------------------------------------------------------------ #

    - name: Wait for all nodes to join the cluster
      shell: "kubectl get nodes --no-headers | wc -l"
      register: node_count
      until: node_count.stdout | int >= 2
      retries: 20
      delay: 15
      delegate_to: k3s-master-venue
      run_once: true

    - name: Wait for nodes to reach 'Ready' status
      shell: "kubectl get nodes | grep -v 'NotReady' | wc -l"
      register: ready_count
      until: ready_count.stdout | int >= 3 # +1 for the header/master
      retries: 10
      delay: 10
      delegate_to: k3s-master-venue
      run_once: true


    - name: Apply labels to worker nodes
      command: >
        kubectl label node {{ item.0.name }} {{ item.1 }} --overwrite
      loop: "{{ k3s_workers | subelements('labels') }}"
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: label_result
      run_once: true
      delegate_to: k3s-master-venue
      changed_when: "'labeled' in label_result.stdout"


    - name: Display label results
      debug:
        msg: "{{ label_result.results | map(attribute='stdout') | list }}"
      when: ansible_host == k3s_master_ip


# ------------------------------------------------------------------ #
#  SECTION 10 — NVIDIA GPU CONFIGURATION                             #
# ------------------------------------------------------------------ #
    - name: Detect NVIDIA GPU
      shell: lspci | grep -i nvidia
      register: nvidia_gpu_check
      failed_when: false
      changed_when: false
      when: ansible_host != k3s_master_ip

    - name: Apply GPU Taint to gpu Node
      kubernetes.core.k8s_taint:
        state: present
        name: "{{ inventory_hostname }}"
        taints:
          - key: "{{ gpu_taint_key }}"
            value: "{{ gpu_taint_value }}"
            effect: "{{ gpu_taint_effect }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      delegate_to: k3s-master-venue
      when: 
        - nvidia_gpu_check is not skipped
        - nvidia_gpu_check.rc == 0


    - name: Verify NVIDIA Container Toolkit is installed
      stat:
        path: /usr/bin/nvidia-container-runtime
      register: nvidia_runtime_binary
      failed_when: not nvidia_runtime_binary.stat.exists
      when: 
        - ansible_host != k3s_master_ip
        - nvidia_gpu_check.rc == 0
      become: true

    - name: Create K3s containerd config directory
      file:
        path: /var/lib/rancher/k3s/agent/etc/containerd
        state: directory
        mode: '0755'
      when: ansible_host != k3s_master_ip
      become: true

    - name: Clean up old K3s/Containerd configurations
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl
        - /var/lib/rancher/k3s/agent/etc/containerd/config.toml
      become: true


    - name: Initial K3s agent restart to generate default config
      systemd:
        name: k3s-agent
        state: restarted
      when: ansible_host != k3s_master_ip
      become: true

    - name: Wait for K3s to regenerate default config.toml
      wait_for:
        path: /var/lib/rancher/k3s/agent/etc/containerd/config.toml
        state: present
        timeout: 30
      when: 
        - ansible_host != k3s_master_ip
        - nvidia_gpu_check.rc == 0

    - name: Configure NVIDIA runtime via nvidia-ctk
      command: >
        nvidia-ctk runtime configure --runtime=containerd 
        --config=/var/lib/rancher/k3s/agent/etc/containerd/config.toml
      become: true
      register: ctk_result
      changed_when: "'Successfully configured' in ctk_result.stdout"
      when: 
        - ansible_host != k3s_master_ip
        - nvidia_gpu_check.rc == 0

    - name: Final K3s agent restart to apply NVIDIA runtime
      systemd:
        name: k3s-agent
        state: restarted
      become: true
      when: ctk_result.changed
        - ansible_host != k3s_master_ip
        - nvidia_gpu_check.rc == 0

    - name: Verify NVIDIA runtime is recognized by containerd
      shell: "crictl info | grep -i nvidia"
      become: true
      register: crictl_check
      until: crictl_check.stdout != ""
      retries: 5
      delay: 5
      when: 
        - ansible_host != k3s_master_ip
        - nvidia_gpu_check.rc == 0

    
    - name: Add NVIDIA Device Plugin Helm repository
      shell: |
        helm repo add nvdp https://nvidia.github.io/k8s-device-plugin
        helm repo update
      delegate_to: k3s-master-venue
      run_once: true

    
    # - name: Deploy NVIDIA Device Plugin via Helm
    #   shell: |
    #     helm upgrade --install nvidia-device-plugin nvdp/nvidia-device-plugin --namespace nvidia-device-plugin  --kubeconfig /etc/rancher/k3s/k3s.yaml --version "0.14.5" --create-namespace  --set "nodeSelector.hardware=gpu" --set "runtimeClassName=nvidia"
         
    #   delegate_to: k3s-master-venue
    #   run_once: true
    #   environment:
    #     KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    
    - name: Deploy NVIDIA Device Plugin via Helm (ML Optimized)
      kubernetes.core.helm:
        name: nvidia-device-plugin
        chart_ref: nvdp/nvidia-device-plugin
        release_namespace: nvidia-device-plugin
        create_namespace: true
        chart_version: "0.14.5"
        wait: yes
        # Moving your --set flags and Tolerations into the values block
        values:
          runtimeClassName: "nvidia"
          nodeSelector:
            hardware: "gpu"
          # This allows the plugin to run on your tainted Legion node
          tolerations:
            - key: "{{ gpu_taint_key }}"
              operator: "Equal"
              value: "{{ gpu_taint_value }}"
              effect: "{{ gpu_taint_effect }}"
            # Best practice: Also tolerate the standard master taints
            - key: "node-role.kubernetes.io/master"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"
              effect: "NoSchedule"
      delegate_to: k3s-master-venue
      run_once: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

        
    - name: Ensure GPU label is present on the Legion node
      shell: kubectl label node ml-gpu-worker-legion hardware=gpu --overwrite
      delegate_to: k3s-master-venue
      run_once: true

    - name: Patch NVIDIA Device Plugin to Tolerate Taint
      kubernetes.core.k8s:
        state: patched
        kind: DaemonSet
        name: nvidia-device-plugin 
        namespace: nvidia-device-plugin 
        definition:
          spec:
            template:
              spec:
                tolerations:
                  - key: "{{ gpu_taint_key }}"
                    operator: "Equal"
                    value: "{{ gpu_taint_value }}"
                    effect: "{{ gpu_taint_effect }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      delegate_to: k3s-master-venue
      run_once: true

    - name: Wait for NVIDIA Device Plugin to register GPUs
      shell: kubectl get node ml-gpu-worker-legion -o jsonpath='{.status.allocatable.nvidia\.com/gpu}'
      register: gpu_avail
      until: gpu_avail.stdout != "" and gpu_avail.stdout != "0"
      retries: 10
      delay: 10
      delegate_to: k3s-master-venue
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      when: 
        - ansible_host != k3s_master_ip
        - nvidia_gpu_check.rc == 0
      

    - name: Wait until NVIDIA Device Plugin has at least one Ready pod
      shell: |
        kubectl get daemonset nvidia-device-plugin -n nvidia-device-plugin -o json | jq '.status.numberReady // 0'
      register: ready_count
      until: ready_count.stdout | int > 0
      retries: 15
      delay: 10
      delegate_to: k3s-master-venue
      run_once: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false
      failed_when: ready_count.stdout | int == 0

    - name: Display plugin status
      debug:
        msg: "{{ ready_count.stdout  }}"
      run_once: true


# ------------------------------------------------------------------ #
#  SECTION 11 — VERIFICATION (MASTER ONLY)                             #
# ------------------------------------------------------------------ #
  
    - name: Check all nodes status
      shell: kubectl get nodes -o wide
      register: node_status
      changed_when: false
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display all nodes
      debug:
        msg: "{{ node_status.stdout_lines }}"
      when: ansible_host == k3s_master_ip

    - name: Check all pods
      shell: kubectl get pods -A
      register: pod_status
      changed_when: false
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display pod status
      debug:
        msg: "{{ pod_status.stdout_lines }}"
      when: ansible_host == k3s_master_ip

    - name: Run Cilium status check
      shell: cilium status --wait
      register: cilium_status
      changed_when: false
      failed_when: false
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display Cilium status
      debug:
        msg: "{{ cilium_status.stdout_lines }}"
      when: ansible_host == k3s_master_ip

    - name: Check Helm releases
      shell: helm list -A
      register: helm_releases
      changed_when: false
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display Helm releases
      debug:
        msg: "{{ helm_releases.stdout_lines }}"
      when: ansible_host == k3s_master_ip

    

# ------------------------------------------------------------------ #
#  SECTION 12 — FINAL SUMMARY                                          #
# ------------------------------------------------------------------ #

    - name: Master node summary
      debug:
        msg:
          - "================================================"
          - "K3s cluster setup complete"
          - "================================================"
          - "Master:            {{ k3s_master_ip }}"
          - "API server:        https://{{ k3s_master_ip }}:6443"
          - "Kubeconfig:        /home/ubuntu/.kube/config"
          - "CNI:               Cilium {{ cilium_version }}"
          - "Ingress:           Cilium Ingress Controller"
          - "Load Balancer:     Cilium L2 Announcements"
          - "LB IP range:       {{ cilium_lb_ip_range }}"
          - "================================================"
          - "Workers joined:"
          - "  - ml-gpu-worker-legion (172.16.0.101)"
          - "  - gitlab-server        (172.16.0.102)"
          - "================================================"
      when: ansible_host == k3s_master_ip

    - name: Worker node summary
      debug:
        msg:
          - "================================================"
          - "K3s agent configured on {{ inventory_hostname }}"
          - "Node IP:    {{ ansible_host }}"
          - "Master:     https://{{ k3s_master_ip }}:6443"
          - "Status:     joined cluster"
          - "================================================"
      when: ansible_host != k3s_master_ip

