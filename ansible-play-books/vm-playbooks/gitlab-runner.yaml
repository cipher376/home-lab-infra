---
- name: "Install and Configure Gitlab Runner on K3s Cluster (Master + Workers)"
  hosts: k3s_servers
  become: true
  vars:
    k3s_version: "stable"
    k3s_master_ip: "172.16.0.103"
    k3s_token_file: "/var/lib/rancher/k3s/server/node-token"
    pod_cidr: "10.244.0.0/16"
    service_cidr: "10.96.0.0/12"
    cilium_version: "1.15.5"
    cilium_lb_ip_range: "172.16.0.200-172.16.0.250"
    k3s_workers:
      - name: "ml-gpu-worker-legion"
        ip: "172.16.0.101"
        labels:
          - "node-role.kubernetes.io/gpu-worker=true"
          - "hardware=gpu"
          - "nvidia.com/gpu=true"
      - name: "k3s-worker-prodesk"
        ip: "172.16.0.104"
        labels:
          - "node-role.kubernetes.io/gitlab=true"
          - "app=gitlab"
    gitlab_runner_token: "{{ lookup('env', 'GITLAB_RUNNER_TOKEN') }}"
    gitlab_url: "https://gitlab.com/"
  
  tasks:
    # ------------------------------------------------------------------ #
    #  GITLAB RUNNER SETUP                                                #
    # ------------------------------------------------------------------ #
    - name: Validate GitLab Runner token
      assert:
        that:
          - gitlab_runner_token is defined
          - gitlab_runner_token | length > 0
          - gitlab_runner_token != ''
        fail_msg: "GITLAB_RUNNER_TOKEN environment variable is not set or empty!"
        success_msg: "GitLab Runner token validated"
      run_once: true

    - name: Check if Helm is installed
      command: which helm
      register: helm_check
      failed_when: false
      changed_when: false
      delegate_to: "{{ groups['k3s_master'][0] }}"
      run_once: true

    - name: Install Helm if not present
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: helm_check.rc != 0
      delegate_to: "{{ groups['k3s_master'][0] }}"
      run_once: true

    - name: Add GitLab Helm repository
      command: helm repo add gitlab https://charts.gitlab.io
      delegate_to: "{{ groups['k3s_master'][0] }}"
      run_once: true
      register: helm_repo_add
      failed_when: false
      changed_when: "'has been added' in helm_repo_add.stdout"

    - name: Update Helm repositories
      command: helm repo update
      delegate_to: "{{ groups['k3s_master'][0] }}"
      run_once: true

    - name: Create GitLab Runner namespace
      command: kubectl create namespace gitlab-runner
      delegate_to: "{{ groups['k3s_master'][0] }}"
      run_once: true
      register: namespace_create
      failed_when: false
      changed_when: "'created' in namespace_create.stdout"

    - name: Create GitLab Runner values file
      copy:
        dest: /tmp/gitlab-runner-values.yaml
        content: |
          gitlabUrl: {{ gitlab_url }}
          runnerRegistrationToken: "{{ gitlab_runner_token }}"
          
          runners:
            config: |
              [[runners]]
                [runners.kubernetes]
                  namespace = "{{.Release.Namespace}}"
                  image = "ubuntu:22.04"
                  privileged = true
                  poll_timeout = 180
                  cpu_request = "100m"
                  memory_request = "128Mi"
                [[runners.kubernetes.volumes.empty_dir]]
                  name = "docker-certs"
                  mount_path = "/certs/client"
                  medium = "Memory"
            
            # Resource limits for the runner pod itself
            resources:
              limits:
                memory: 512Mi
                cpu: 500m
              requests:
                memory: 128Mi
                cpu: 100m
            
            # Schedule on GPU node if available
            nodeSelector:
              nvidia.com/gpu: "true"
            
            # Allow scheduling on nodes without GPU as fallback
            tolerations:
              - key: "nvidia.com/gpu"
                operator: "Exists"
                effect: "NoSchedule"
        mode: '0644'
      delegate_to: "{{ groups['k3s_master'][0] }}"
      run_once: true

    - name: Check if GitLab Runner is already installed
      command: helm list -n gitlab-runner -o json
      register: helm_list
      delegate_to: "{{ groups['k3s_master'][0] }}"
      run_once: true
      changed_when: false

    - name: Install or upgrade GitLab Runner via Helm
      command: >
        helm upgrade --install gitlab-runner gitlab/gitlab-runner
        --namespace gitlab-runner
        --values /tmp/gitlab-runner-values.yaml
        --wait
        --timeout 5m
      delegate_to: "{{ groups['k3s_master'][0] }}"
      run_once: true
      register: helm_install

    - name: Display GitLab Runner installation status
      debug:
        msg: "{{ helm_install.stdout_lines }}"

    - name: Wait for GitLab Runner pod to be ready
      command: kubectl wait --for=condition=ready pod -l app=gitlab-runner -n gitlab-runner --timeout=300s
      delegate_to: "{{ groups['k3s_master'][0] }}"
      run_once: true
      register: runner_ready
      retries: 3
      delay: 10
      until: runner_ready.rc == 0

    - name: Get GitLab Runner pod status
      command: kubectl get pods -n gitlab-runner -o wide
      register: runner_pods
      delegate_to: "{{ groups['k3s_master'][0] }}"
      run_once: true

    - name: Display GitLab Runner pod status
      debug:
        msg: "{{ runner_pods.stdout_lines }}"

    - name: Verify runner registration
      command: kubectl logs -n gitlab-runner -l app=gitlab-runner --tail=50
      register: runner_logs
      delegate_to: "{{ groups['k3s_master'][0] }}"
      run_once: true

    - name: Display runner logs
      debug:
        msg: "{{ runner_logs.stdout_lines }}"

    - name: Create info message
      debug:
        msg: |
          ============================================
          GitLab Runner Installation Complete!
          ============================================
          Namespace: gitlab-runner
          GitLab URL: {{ gitlab_url }}
          Node Selector: nvidia.com/gpu=true
          
          To verify:
            kubectl get pods -n gitlab-runner
            kubectl logs -n gitlab-runner -l app=gitlab-runner
          
          To uninstall:
            helm uninstall gitlab-runner -n gitlab-runner
          ============================================
      run_once: true