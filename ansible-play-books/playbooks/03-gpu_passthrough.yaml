- name: "Configure NVIDIA GPU Passthrough on Proxmox"
  hosts: legion-node-01
  become: yes
  vars:
    gpu_pci_ids:
      - "0000:01:00.0"
      - "0000:01:00.1"
      - "0000:01:00.2"
      - "0000:01:00.3"
    gpu_vendor_ids:
      - "10de:2191"  # GTX 1660Ti Mobile GPU
    mapping_name: "Legion-GPU"
    mapping_iommu_group: 14
    mapping_subsystem_id: "17aa:3fc7"
    iommu_modules:
      - vfio
      - vfio_iommu_type1
      - vfio_pci
    blacklisted_modules:
      - nvidia
      - nvidia_drm
      - nvidia_modeset
      - nvidia_uvm
      - nouveau
      - i2c_nvidia_gpu

  tasks:
    - name: Check current kernel cmdline
      command: cat /proc/cmdline
      register: current_cmdline
      changed_when: false

    - name: Ensure IOMMU and passthrough kernel parameters are set
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: >-
          GRUB_CMDLINE_LINUX_DEFAULT="quiet
          intel_iommu=on
          iommu=pt
          pcie_acs_override=downstream,multifunction
          video=efifb:off
          initcall_blacklist=sysfb_init
          module_blacklist=nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm,nouveau,i2c_nvidia_gpu"
      register: grub_changed
      notify: Update grub

    - name: Load VFIO modules at boot
      copy:
        dest: /etc/modules-load.d/vfio.conf
        content: |
          vfio
          vfio_iommu_type1
          vfio_pci
        mode: '0644'
      register: modules_changed

    - name: Bind GPU PCI IDs to VFIO
      copy:
        dest: /etc/modprobe.d/vfio.conf
        content: |
          options vfio-pci ids={{ gpu_vendor_ids | join(',') }}
          softdep nvidia pre: vfio-pci
          softdep nouveau pre: vfio-pci
        mode: '0644'
      register: vfio_conf_changed

    - name: Blacklist NVIDIA and Nouveau drivers
      copy:
        dest: /etc/modprobe.d/blacklist-nvidia.conf
        content: |
          {% for mod in blacklisted_modules %}
          blacklist {{ mod }}
          install {{ mod }} /bin/false
          {% endfor %}
        mode: '0644'
      register: blacklist_changed

    - name: Update initramfs if any module config changed
      command: update-initramfs -u -k all
      when: >
        modules_changed.changed or
        vfio_conf_changed.changed or
        blacklist_changed.changed

    - name: Verify IOMMU groups exist
      shell: ls /sys/kernel/iommu_groups/{{ mapping_iommu_group }}/devices/
      register: iommu_group_check
      changed_when: false
      failed_when: iommu_group_check.rc != 0

    - name: Check current driver binding for GPU functions
      shell: "lspci -nnk | grep -A3 '01:00'"
      register: pci_driver_check
      changed_when: false

    - name: Display current PCI driver bindings
      debug:
        msg: "{{ pci_driver_check.stdout_lines }}"

    - name: Warn if VFIO not yet active (reboot required)
      debug:
        msg: >
          WARNING: GPU is not yet bound to vfio-pci.
          A reboot is required for passthrough to take effect.
      when: "'vfio-pci' not in pci_driver_check.stdout"

    - name: Create Proxmox PCI mapping for Legion GPU
      shell: |
        # Check if mapping already exists
        if pvesh get /cluster/mapping/pci/{{ mapping_name }} > /dev/null 2>&1; then
          pvesh set /cluster/mapping/pci/{{ mapping_name }} \
            --map "id={{ gpu_vendor_ids | join(',') }},iommugroup={{ mapping_iommu_group }},node={{ inventory_hostname }},path={{ gpu_pci_ids | join(';') }},subsystem-id={{ mapping_subsystem_id }}"
          echo "updated"
        else
          pvesh create /cluster/mapping/pci \
            --id {{ mapping_name }} \
            --map "id={{ gpu_vendor_ids | join(',') }},iommugroup={{ mapping_iommu_group }},node={{ inventory_hostname }},path={{ gpu_pci_ids | join(';') }},subsystem-id={{ mapping_subsystem_id }}"
          echo "created"
        fi
      register: mapping_result
      changed_when: "'created' in mapping_result.stdout or 'updated' in mapping_result.stdout"

    - name: Verify mapping was created
      shell: pvesh get /cluster/mapping/pci/{{ mapping_name }}
      register: mapping_verify
      changed_when: false

    - name: Display mapping config
      debug:
        msg: "{{ mapping_verify.stdout_lines }}"

    - name: Verify VFIO module is loaded
      shell: lsmod | grep vfio
      register: vfio_loaded
      changed_when: false
      failed_when: false

    - name: Display VFIO module status
      debug:
        msg: "{{ vfio_loaded.stdout_lines if vfio_loaded.stdout else 'VFIO modules not loaded - reboot required' }}"

    - name: Reboot if kernel parameters or module config changed
      reboot:
        reboot_timeout: 300
        msg: "Rebooting to apply IOMMU and VFIO changes"
      when: grub_changed.changed

    - name: Post-reboot verification - check VFIO binding
      shell: lspci -nnk | grep -A3 "01:00.0"
      register: post_reboot_check
      changed_when: false
      when: grub_changed.changed

    - name: Assert GPU is bound to vfio-pci
      assert:
        that: "'vfio-pci' in post_reboot_check.stdout"
        fail_msg: "GPU is not bound to vfio-pci after reboot - check dmesg for errors"
        success_msg: "GPU successfully bound to vfio-pci"
      when: grub_changed.changed

  handlers:
    - name: Update grub
      command: update-grub