---
- name: Proxmox GPU Passthrough Configuration (Lenovo Legion)
  hosts: legion_nodes
  become: true
  vars:
    # Update these IDs if you change hardware
    gpu_ids: "10de:2191,10de:1aeb,10de:1aec,10de:1aed"

  tasks:

# --- SECTION 2: LEGION NODE (GPU PASSTHROUGH) ---
    - name: 1. Enable IOMMU and ACS Override in GRUB
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet intel_iommu=on iommu=pt pcie_acs_override=downstream,multifunction video=efifb:off video=vesafb:off initcall_blacklist=sysfb_init module_blacklist=nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm,nouveau,i2c_nvidia_gpu"'
      notify: 
        - update_grub
        - update_initramfs
        - reboot_node
      when: inventory_hostname == 'legion-node-01'

    - name: 2. Blacklist all NVIDIA and i2c drivers
      copy:
        dest: /etc/modprobe.d/blacklist.conf
        content: |
          blacklist nvidia
          blacklist nvidia-drm
          blacklist nvidia-modeset
          blacklist nvidia-uvm
          blacklist nouveau
          blacklist i2c_nvidia_gpu
          blacklist i2c_ccgx_ucsi
          blacklist ucsi_ccg
          blacklist snd_hda_intel
          blacklist snd_hda_codec_hdmi
      when: inventory_hostname == 'legion-node-01'
    
    - name: 3. Configure VFIO IDs and Interrupt Remapping
      copy:
        dest: "{{ item.dest }}"
        content: "{{ item.content }}"
      loop:
        - { dest: '/etc/modprobe.d/vfio.conf', content: 'options vfio-pci ids={{ gpu_ids }} disable_vga=1' }
        - { dest: '/etc/modprobe.d/vfio-unsafe-interrupts.conf', content: 'options vfio_iommu_type1 allow_unsafe_interrupts=1' }
      notify: 
        - update_initramfs
        - reboot_node
      when: inventory_hostname == 'legion-node-01'

    - name: 4. Ensure VFIO Kernel Modules are Loaded
      lineinfile:
        path: /etc/modules
        line: "{{ item }}"
      loop:
        - vfio
        - vfio_iommu_type1
        - vfio_pci
        - vfio_virqfd
      notify: 
        - update_initramfs
        - reboot_node

    - name: 5. Verify IOMMU is active (Dry Run Check)
      shell: dmesg | grep -e DMAR -e IOMMU
      register: iommu_status
      changed_when: false
      when: inventory_hostname == 'legion-node-01'

  handlers:
    - name: update_grub
      command: update-grub

    - name: update_initramfs
      command: update-initramfs -u -k all

    - name: reboot_node
      reboot:
        msg: "Hardware passthrough changes detected. Rebooting Legion node..."
        reboot_timeout: 600