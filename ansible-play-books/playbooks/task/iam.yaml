
# --- SECTION 5: IDENTITY & ACCESS MANAGEMENT (IAM) ---
    - name: Ensure Terraform Role and User Exist
      shell: |
        pveum role add TerraformAdmin -privs "VM.Allocate VM.Clone VM.Config.CDROM VM.Config.CPU VM.Config.Cloudinit VM.Config.Disk VM.Config.HWType VM.Config.Memory VM.Config.Network VM.Config.Options VM.Audit VM.PowerMgmt VM.Migrate Datastore.AllocateSpace Datastore.Audit Sys.Audit Sys.Console Mapping.Use SDN.Use Datastore.Allocate" || true
        pveum user add {{ proxmox_api_user }}@{{ proxmox_api_realm }} --comment "Terraform Automation User" || true
      run_once: true
      delegate_to: "{{ groups['proxmox_master'][0] }}"

    - name: Clean up old token to ensure fresh secret generation
      shell: "pveum user token delete {{ proxmox_api_user }}@{{ proxmox_api_realm }} {{ proxmox_api_token_id }} || true"
      run_once: true
      delegate_to: "{{ groups['proxmox_master'][0] }}"

    - name: Create API Token for Terraform
      shell: "pveum user token add {{ proxmox_api_user }}@{{ proxmox_api_realm }} {{ proxmox_api_token_id }} --privsep 0 --output-format json"
      register: token_output
      run_once: true
      delegate_to: "{{ groups['proxmox_master'][0] }}"

    - name: Set Token Secret Fact
      set_fact:
        pve_secret_uuid: "{{ (token_output.stdout | from_json).value }}"
      run_once: true

    - name: Apply Permissions to User and Token
      shell: |
        pveum acl modify / -user {{ proxmox_api_user }}@{{ proxmox_api_realm }} -role TerraformAdmin
        pveum acl modify / -token '{{ proxmox_api_user }}@{{ proxmox_api_realm }}!{{ proxmox_api_token_id }}' -role TerraformAdmin
      run_once: true
      delegate_to: "{{ groups['proxmox_master'][0] }}"

    - name: Create local environment setup script
      delegate_to: localhost
      become: false  # Runs as your local Fedora user, not root
      copy:
        content: |
          #!/bin/bash
          export TF_VAR_proxmox_api_token_id="{{ proxmox_api_user }}@{{ proxmox_api_realm }}!{{ proxmox_api_token_id }}"
          export TF_VAR_proxmox_api_token_secret="{{ pve_secret_uuid }}"
          echo "Terraform environment variables loaded for {{ proxmox_api_user }}"
        dest: "./setup_terraform_env.sh"
        mode: '0700'