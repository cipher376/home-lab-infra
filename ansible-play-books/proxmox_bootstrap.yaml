---
- name: "Bootstrap Proxmox Cluster: Hardware & Storage Readiness"
  hosts: proxmox_nodes
  become: yes
  vars:
    # Industry Standard: Define variables for easy updates
    network_range: "172.16.0.0/24"
    model_path: "/HDD-8Tb/models"
    gpu_id: "0000:01:00.0"
  
  vars_files:
    - vars/secrets.yaml  

  tasks:
    # --- SECTION 1: COMMON CONFIGURATION (All Nodes) ---
    - name: Install essential infrastructure tools
      apt:
        name: 
          - libguestfs-tools
          - nfs-kernel-server
          - qemu-guest-agent
        state: present
        update_cache: yes

    - name: Enable Cloud-Init Snippets on local storage
      # We use 'pvesm set' to ensure the 'local' directory can host our Terraform yaml files
      command: pvesm set local --content backup,iso,vztmpl,snippets
      changed_when: false

    # --- SECTION 2: LEGION NODE (GPU PASSTHROUGH) ---
    - name: Apply ACS Override and IOMMU to GRUB
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        # Adds ACS override and disables the EFI framebuffer to keep the host off the GPU
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet intel_iommu=on iommu=pt pcie_acs_override=downstream,multifunction video=efifb:off"'
      register: grub_config
      when: inventory_hostname == 'legion-node-01'

    - name: Update GRUB
      command: update-grub
      when: 
        - inventory_hostname == 'legion-node-01'
        - grub_config.changed

    - name: Stub GPU and USB Controller for VFIO
      # We use copy/content here to ensure the file is EXACTLY as we want it
      copy:
        dest: /etc/modprobe.d/vfio.conf
        content: |
          # 1660 Ti GPU and USB Controller
          options vfio-pci ids=10de:2191,10de:1aeb,10de:1aec,10de:1aed disable_vga=1
      register: vfio_config
      when: inventory_hostname == 'legion-node-01'

    - name: Ensure VFIO modules load at boot
      # Adds the necessary drivers to /etc/modules
      lineinfile:
        path: /etc/modules
        line: "{{ item }}"
      loop:
        - vfio
        - vfio_iommu_type1
        - vfio_pci
        - vfio_virqfd
      register: modules_config
      when: inventory_hostname == 'legion-node-01'

    - name: Rebuild Initramfs on Change
      command: update-initramfs -u -k all
      when: 
        - inventory_hostname == 'legion-node-01'
        - (vfio_config.changed or modules_config.changed)
    - name: Verify IOMMU is enabled in Kernel
      shell: dmesg | grep -e DMAR -e IOMMU
      register: iommu_check
      failed_when: "'enabled' not in iommu_check.stdout"
      changed_when: false
      when: inventory_hostname == 'legion-node-01'




    # --- SECTION 3: HARDWARE MAPPING (Legion Node) ---
    - name: Ensure PCI Mapping Directory exists
      file:
        path: /etc/pve/mapping
        state: directory
        # No 'mode' here, pmxcfs manages its own permissions
      when: inventory_hostname == 'legion-node-01'

    - name: Map NVIDIA GPU via Direct Shell Injection
      # We use 'grep' to check for the line first to keep it idempotent
      shell: |
        if ! grep -q "Legion-GPU" /etc/pve/mapping/pci.cfg 2>/dev/null; then
          echo "pci: Legion-GPU --nodes legion-node-01 --path {{ gpu_id }}" >> /etc/pve/mapping/pci.cfg
        fi
      register: pci_map_result
      changed_when: "pci_map_result.stdout == ''"
      when: inventory_hostname == 'legion-node-01'
      run_once: true

    # --- SECTION 4: PRODESK NODE (STORAGE & NFS) ---
    - name: Check if ZFS pool already exists
      shell: "zpool list -H -o name | grep -w 'HDD-8Tb'"
      register: zpool_check
      failed_when: false
      changed_when: false
      when: inventory_hostname == 'prodesk-node-02'

    - name: Wipe existing partitions on 8TB drive
      # Only run wipefs if the pool IS NOT found and partitions ARE found
      shell: "wipefs -a /dev/sda"
      when: 
        - inventory_hostname == 'prodesk-node-02'
        - zpool_check.rc != 0
        - ansible_facts['devices']['sda']['partitions'] | length > 0
      ignore_errors: yes 

    - name: Ensure ZFS Pool exists on 8TB Drive
      community.general.zpool:
        name: "HDD-8Tb"
        state: present
        vdevs:
          - disks:
              - /dev/sda
        pool_properties:
          ashift: "12"
      when: inventory_hostname == 'prodesk-node-02'

    - name: Create Models Dataset with ML Optimizations
      community.general.zfs:
        name: "HDD-8Tb/models"
        state: present
        extra_zfs_properties:
          recordsize: 1M
          compression: lz4
          atime: "off"
          mountpoint: /HDD-8Tb
      when: inventory_hostname == 'prodesk-node-02'

    - name: Verify ZFS Health for 8TB Pool
      command: zpool status HDD-8Tb
      changed_when: false
      when: inventory_hostname == 'prodesk-node-02'

    - name: Setup Model Registry Directory
      # Industry Standard: Explicitly set 777 for multi-VM shared access
      file:
        path: "{{ model_path }}"
        state: directory
        owner: root
        group: root
        mode: '0777'
      when: inventory_hostname == 'prodesk-node-02'

    - name: Export Model Registry via NFS
      # lineinfile ensures we don't duplicate lines in /etc/exports
      lineinfile:
        path: /etc/exports
        line: "{{ model_path }} {{ network_range }}(rw,sync,no_subtree_check,no_root_squash)"
        state: present
      register: nfs_config
      when: inventory_hostname == 'prodesk-node-02'

    - name: Apply NFS changes
      command: exportfs -ra
      when: 
        - inventory_hostname == 'prodesk-node-02'
        - nfs_config.changed
# --- SECTION 5: IDENTITY & ACCESS MANAGEMENT (IAM) ---
    - name: Ensure Terraform User and Role Exist
      shell: |
        pveum role add TerraformAdmin -privs "VM.Allocate VM.Clone VM.Config.CDROM VM.Config.CPU VM.Config.Cloudinit VM.Config.Disk VM.Config.HWType VM.Config.Memory VM.Config.Network VM.Config.Options VM.Audit VM.PowerMgmt VM.Migrate Datastore.AllocateSpace Datastore.Audit Sys.Audit Sys.Console Mapping.Use" || true
        pveum user add terraform-prov@pve --password "{{ terraform_bot_password }}" || true
      register: user_creation
      changed_when: "'already exists' not in user_creation.stderr"

    #Delete and recreate token to ensure we have the latest secret value for Terraform (idempotent)
    - name: Clean up old token to ensure fresh secret generation
      shell: "pveum user token delete terraform-prov@pve haivision-manager || true"
      when: inventory_hostname == 'prodesk-node-02' # Run on Master only

    - name: Create API Token for Terraform
      shell: |
        pveum user token add terraform-prov@pve haivision-manager --privsep 0 --output-format json
      register: token_output
      # Idempotency: Ignore error if token already exists
      failed_when: 
        - token_output.rc != 0 
        - "'already exists' not in token_output.stderr"
      changed_when: "'already exists' not in token_output.stderr"

    - name: "CRITICAL: Display Terraform API Token"
      debug:
        msg: 
          - "--- PROXMOX API TOKEN DETAILS ---"
          - "Token ID: terraform-prov@pve!haivision-manager"
          - "Secret Value: {{ (token_output.stdout | from_json).value }}"
      when: token_output.changed

    - name: Apply Permissions to User and Token
      shell: |
        # Apply to User
        pveum acl modify / -user terraform-prov@pve -role TerraformAdmin
        # Apply to Token (Now that it definitely exists)
        pveum acl modify / -token 'terraform-prov@pve!haivision-manager' -role TerraformAdmin
      changed_when: true