- name: "Destroy Ubuntu 24.04 Cloud-Init Template"
  hosts: proxmox_nodes
  become: yes
  vars:
    template_id: 9000
    storage_pool: "Cluster-Templates"

  tasks:
    - name: Check if template {{ template_id }} exists
      command: "qm status {{ template_id }}"
      register: template_check
      failed_when: false
      changed_when: false
      run_once: true

    - block:
        - name: Get template disk list before destruction
          shell: |
            qm config {{ template_id }} | grep -E "^(scsi|ide|efidisk|unused)" | awk -F: '{print $2":"$3}' | awk '{print $1}'
          register: template_disks
          changed_when: false

        - name: Display disks to be removed
          debug:
            msg: "Disks to be purged: {{ template_disks.stdout_lines }}"

        - name: Explicitly free each disk volume before destroy
          shell: |
            pvesm free "{{ item }}" && echo "freed {{ item }}" || echo "failed {{ item }}"
          loop: "{{ template_disks.stdout_lines }}"
          register: pre_free_result
          when: template_disks.stdout_lines | length > 0
          changed_when: "'freed' in pre_free_result.stdout"

        - name: Display pre-destroy free results
          debug:
            msg: "{{ pre_free_result.results | map(attribute='stdout') | list }}"
          when: template_disks.stdout_lines | length > 0

        - name: Unlock template if locked
          shell: qm unlock {{ template_id }} || true
          changed_when: false

        - name: Destroy template VM and all associated disks
          command: >
            qm destroy {{ template_id }}
            --destroy-unreferenced-disks 1
            --purge 1
          register: destroy_result

        - name: Display destroy result
          debug:
            msg: "{{ destroy_result.stdout_lines }}"

        - name: Scan storage pool for any leftover volumes
          shell: |
            pvesm list {{ storage_pool }} 2>/dev/null | grep "vm-{{ template_id }}" | awk '{print $1}'
          register: leftover_volumes
          changed_when: false

        - name: Display leftover volumes found
          debug:
            msg: "Leftover volumes found: {{ leftover_volumes.stdout_lines }}"

        - name: Force free each leftover volume individually
          shell: |
            echo "Attempting to free: {{ item }}"
            pvesm free "{{ item }}" && echo "SUCCESS: freed {{ item }}" || echo "FAILED: {{ item }}"
          loop: "{{ leftover_volumes.stdout_lines }}"
          register: leftover_free_result
          when: leftover_volumes.stdout_lines | length > 0
          changed_when: "'SUCCESS' in leftover_free_result.stdout"

        - name: Display leftover free results
          debug:
            msg: "{{ leftover_free_result.results | map(attribute='stdout') | list }}"
          when:
            - leftover_volumes.stdout_lines | length > 0
            - leftover_free_result is defined

        - name: Final scan to confirm all volumes removed
          shell: |
            pvesm list {{ storage_pool }} 2>/dev/null | grep "vm-{{ template_id }}" || echo "clean"
          register: final_scan
          changed_when: false

        - name: Fail if volumes still remain
          fail:
            msg: >
              The following volumes could not be removed and need
              manual cleanup: {{ final_scan.stdout_lines }}
          when: "'clean' not in final_scan.stdout"

        - name: Remove libguestfs-tools
          apt:
            name: libguestfs-tools
            state: absent
            purge: yes

        - name: Remove temp cloud image if it still exists
          file:
            path: "/tmp/noble-24.04.img"
            state: absent

        - name: Verify template VM is gone
          command: "qm status {{ template_id }}"
          register: verify_destroy
          failed_when: verify_destroy.rc == 0
          changed_when: false

        - name: Confirm full destruction
          debug:
            msg: "Template {{ template_id }} and all associated disks have been removed"

      when: template_check.rc == 0
      run_once: true
      delegate_to: prodesk-node-02

    - name: Skip message if template does not exist
      debug:
        msg: "Template {{ template_id }} does not exist, nothing to clean up"
      when: template_check.rc != 0
      run_once: true