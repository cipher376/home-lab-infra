---
- name: Reverse Proxmox GPU Passthrough Configuration (Lenovo Legion)
  hosts: legion_nodes
  become: true

  tasks:

    - name: 1. Restore default GRUB cmdline (remove IOMMU and passthrough params)
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet"'
      notify:
        - update_grub
        - update_initramfs
        - reboot_node
      when: inventory_hostname == 'legion-node-01'

    - name: 2. Remove NVIDIA and driver blacklist config
      file:
        path: /etc/modprobe.d/blacklist.conf
        state: absent
      when: inventory_hostname == 'legion-node-01'
      notify:
        - update_initramfs
        - reboot_node

    - name: 3. Remove VFIO modprobe configs
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/modprobe.d/vfio.conf
        - /etc/modprobe.d/vfio-unsafe-interrupts.conf
      when: inventory_hostname == 'legion-node-01'
      notify:
        - update_initramfs
        - reboot_node

    - name: 4. Remove VFIO kernel modules from /etc/modules
      lineinfile:
        path: /etc/modules
        line: "{{ item }}"
        state: absent
      loop:
        - vfio
        - vfio_iommu_type1
        - vfio_pci
        - vfio_virqfd
      notify:
        - update_initramfs
        - reboot_node

    - name: 5. Unload VFIO modules from running kernel (pre-reboot best effort)
      shell: |
        modprobe -r vfio_pci || true
        modprobe -r vfio_iommu_type1 || true
        modprobe -r vfio || true
      changed_when: false
      failed_when: false
      when: inventory_hostname == 'legion-node-01'

    - name: 6. Verify VFIO modules are unloaded
      shell: lsmod | grep vfio
      register: vfio_check
      changed_when: false
      failed_when: false
      when: inventory_hostname == 'legion-node-01'

    - name: 7. Warn if VFIO modules still loaded (reboot will clear them)
      debug:
        msg: >
          WARNING: VFIO modules still active in running kernel.
          They will be fully removed after the reboot.
      when:
        - inventory_hostname == 'legion-node-01'
        - vfio_check.stdout | length > 0

    - name: 8. Verify GPU is released from VFIO after reboot
      shell: lspci -nnk | grep -A3 "01:00.0"
      register: gpu_driver_check
      changed_when: false
      when: inventory_hostname == 'legion-node-01'

    - name: 9. Display current GPU driver binding
      debug:
        msg: "{{ gpu_driver_check.stdout_lines }}"
      when: inventory_hostname == 'legion-node-01'

    - name: 10. Assert GPU is no longer bound to vfio-pci
      assert:
        that: "'vfio-pci' not in gpu_driver_check.stdout"
        fail_msg: >
          GPU is still bound to vfio-pci after reboot.
          Check /etc/modprobe.d/ for leftover vfio configs.
        success_msg: "GPU successfully released from vfio-pci"
      when: inventory_hostname == 'legion-node-01'

  handlers:
    - name: update_grub
      command: update-grub

    - name: update_initramfs
      command: update-initramfs -u -k all

    - name: reboot_node
      reboot:
        msg: "Reversing passthrough config. Rebooting Legion node..."
        reboot_timeout: 600