---
- name: Reverse Proxmox GPU Passthrough Configuration (Lenovo Legion)
  hosts: proxmox_nodes
  become: true
  vars:
    mapping_name: "Legion-GPU"

  tasks:
    - name: "Skip play for non-Legion nodes"
      meta: end_host
      when: inventory_hostname != 'legion-node-01'

    - name: "Check if mapping {{ mapping_name }} exists"
      shell: pvesh get /cluster/mapping/pci/{{ mapping_name }} > /dev/null 2>&1
      register: mapping_check
      failed_when: false
      changed_when: false

    - name: "Display current mapping before removal"
      shell: pvesh get /cluster/mapping/pci/{{ mapping_name }}
      register: mapping_content
      changed_when: false
      when: mapping_check.rc == 0

    - name: "Show current mapping"
      debug:
        msg: "{{ mapping_content.stdout_lines }}"
      when: mapping_check.rc == 0

    - name: "Remove mapping {{ mapping_name }}"
      shell: pvesh delete /cluster/mapping/pci/{{ mapping_name }}
      register: mapping_delete
      changed_when: mapping_delete.rc == 0
      when: mapping_check.rc == 0

    - name: "Skip message if mapping does not exist"
      debug:
        msg: "Mapping {{ mapping_name }} does not exist — nothing to remove"
      when: mapping_check.rc != 0

    - name: "Verify mapping is removed"
      shell: |
        pvesh get /cluster/mapping/pci/{{ mapping_name }} 2>&1 || true
      register: mapping_verify
      changed_when: false

    - name: "Assert mapping is gone"
      assert:
        that: >
          'not found' in mapping_verify.stdout or
          'not found' in mapping_verify.stderr
        fail_msg: "Mapping {{ mapping_name }} still exists after deletion"
        success_msg: "Mapping {{ mapping_name }} successfully removed"

    - name: "Show all remaining PCI mappings"
      shell: pvesh get /cluster/mapping/pci 2>/dev/null || echo "No mappings found"
      register: remaining_mappings
      changed_when: false

    - name: "Display remaining mappings"
      debug:
        msg: "{{ remaining_mappings.stdout_lines }}"
    - name: 1. Restore default GRUB cmdline (remove IOMMU and passthrough params)
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet"'
      notify:
        - update_grub
        - update_initramfs
        - reboot_node
      when: inventory_hostname == 'legion-node-01'

    - name: 2. Remove NVIDIA and driver blacklist config
      file:
        path: /etc/modprobe.d/blacklist.conf
        state: absent
      when: inventory_hostname == 'legion-node-01'
      notify:
        - update_initramfs
        - reboot_node

    - name: 3. Remove VFIO modprobe configs
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/modprobe.d/vfio.conf
        - /etc/modprobe.d/vfio-unsafe-interrupts.conf
      when: inventory_hostname == 'legion-node-01'
      notify:
        - update_initramfs
        - reboot_node

    - name: 4. Remove VFIO kernel modules from /etc/modules
      lineinfile:
        path: /etc/modules
        line: "{{ item }}"
        state: absent
      loop:
        - vfio
        - vfio_iommu_type1
        - vfio_pci
        - vfio_virqfd
      notify:
        - update_initramfs
        - reboot_node

    - name: 5. Unload VFIO modules from running kernel (pre-reboot best effort)
      shell: |
        modprobe -r vfio_pci || true
        modprobe -r vfio_iommu_type1 || true
        modprobe -r vfio || true
      changed_when: false
      failed_when: false
      when: inventory_hostname == 'legion-node-01'

    - name: 6. Verify VFIO modules are unloaded
      shell: lsmod | grep vfio
      register: vfio_check
      changed_when: false
      failed_when: false
      when: inventory_hostname == 'legion-node-01'

    - name: 7. Warn if VFIO modules still loaded (reboot will clear them)
      debug:
        msg: >
          WARNING: VFIO modules still active in running kernel.
          They will be fully removed after the reboot.
      when:
        - inventory_hostname == 'legion-node-01'
        - vfio_check.stdout | length > 0

    - name: 8. Verify GPU is released from VFIO after reboot
      shell: lspci -nnk | grep -A3 "01:00.0"
      register: gpu_driver_check
      changed_when: false
      when: inventory_hostname == 'legion-node-01'

    - name: 9. Display current GPU driver binding
      debug:
        msg: "{{ gpu_driver_check.stdout_lines }}"
      when: inventory_hostname == 'legion-node-01'

    - name: 10. Assert GPU is no longer bound to vfio-pci
      assert:
        that: "'vfio-pci' not in gpu_driver_check.stdout"
        fail_msg: >
          GPU is still bound to vfio-pci after reboot.
          Check /etc/modprobe.d/ for leftover vfio configs.
        success_msg: "GPU successfully released from vfio-pci"
      when: inventory_hostname == 'legion-node-01'

  handlers:
    - name: update_grub
      command: update-grub

    - name: update_initramfs
      command: update-initramfs -u -k all

    - name: reboot_node
      reboot:
        msg: "Reversing passthrough config. Rebooting Legion node..."
        reboot_timeout: 600