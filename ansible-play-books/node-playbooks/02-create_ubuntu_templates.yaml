---
- name: "Create and Distribute Ubuntu 24.04 Cloud-Init Template"
  hosts: proxmox_nodes
  become: yes
  vars:
    cloud_img_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
    shared_storage: "Cluster-Templates"
    distribution:
      - node: "prodesk-node-02"
        node_ip: "172.16.0.15"
        template_id: 9000
        template_name: "ubuntu-24-template"
        local_storage: "local-lvm"
      - node: "legion-node-01"
        node_ip: "172.16.0.10"
        template_id: 9001
        template_name: "ubuntu-24-template-legion"
        local_storage: "local-lvm"
      - node: "venue-node-03"
        node_ip: "172.16.0.20"
        template_id: 9002
        template_name: "ubuntu-24-template-venue"
        local_storage: "local-lvm"

  tasks:

# ------------------------------------------------------------------ #
#  SECTION 1 — PREPARE BASE IMAGE                                      #
# ------------------------------------------------------------------ #

    - name: Install libguestfs-tools
      apt:
        name: libguestfs-tools
        state: present
      run_once: true
      delegate_to: prodesk-node-02

    - name: Check if Ubuntu 24.04 cloud image already exists
      stat:
        path: "/tmp/noble-24.04.img"
      register: cloud_image
      run_once: true
      delegate_to: prodesk-node-02

    - name: Download Ubuntu 24.04 Cloud Image
      get_url:
        url: "{{ cloud_img_url }}"
        dest: "/tmp/noble-24.04.img"
        checksum: "sha256:https://cloud-images.ubuntu.com/noble/current/SHA256SUMS"
      when: not cloud_image.stat.exists
      run_once: true
      delegate_to: prodesk-node-02

    - name: Patch Image (Install Guest Agent)
      command: "virt-customize -a /tmp/noble-24.04.img --install qemu-guest-agent"
      when: not cloud_image.stat.exists
      run_once: true
      delegate_to: prodesk-node-02

# ------------------------------------------------------------------ #
#  SECTION 2 — CREATE AND DISTRIBUTE TEMPLATE PER NODE                 #
# ------------------------------------------------------------------ #

    - name: "Check if template already exists on target node"
      shell: >
        ssh -o StrictHostKeyChecking=no root@{{ item.node_ip }}
        "qm status {{ item.template_id }} 2>/dev/null && echo exists || echo missing"
      register: template_existence
      changed_when: false
      failed_when: false
      loop: "{{ distribution }}"
      run_once: true
      delegate_to: prodesk-node-02

    - name: "Display template existence status"
      debug:
        msg: "Template {{ item.item.template_id }} on {{ item.item.node }}: {{ item.stdout }}"
      loop: "{{ template_existence.results }}"
      run_once: true

    - name: "Create VM shell on target node"
      shell: >
        ssh -o StrictHostKeyChecking=no root@{{ item.item.node_ip }}
        "qm create {{ item.item.template_id }}
        --name {{ item.item.template_name }}
        --machine q35
        --bios ovmf
        --net0 virtio,bridge=vmbr0
        --scsihw virtio-scsi-pci
        --agent 1
        --serial0 socket
        --vga serial0"
        && echo "VM shell created"
        || echo "VM shell creation failed"
      loop: "{{ template_existence.results }}"
      when: "'missing' in item.stdout"
      register: vm_shell_result
      changed_when: "'VM shell created' in vm_shell_result.stdout"
      run_once: true
      delegate_to: prodesk-node-02

    - name: "Display VM shell creation results"
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ vm_shell_result.results }}"
      when: item.stdout is defined
      run_once: true

    - name: "Copy image to target node"
      shell: >
        scp -o StrictHostKeyChecking=no
        /tmp/noble-24.04.img
        root@{{ item.item.node_ip }}:/tmp/noble-{{ item.item.template_id }}.img
        && echo "copy complete"
        || echo "copy failed"
      loop: "{{ template_existence.results }}"
      when: "'missing' in item.stdout"
      register: scp_result
      changed_when: "'copy complete' in scp_result.stdout"
      run_once: true
      delegate_to: prodesk-node-02

    - name: "Display image copy results"
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ scp_result.results }}"
      when: item.stdout is defined
      run_once: true

    - name: "Import disk to local storage on target node"
      shell: >
        ssh -o StrictHostKeyChecking=no root@{{ item.item.node_ip }}
        "qm importdisk {{ item.item.template_id }}
        /tmp/noble-{{ item.item.template_id }}.img
        {{ item.item.local_storage }}
        --format raw"
      loop: "{{ template_existence.results }}"
      when: "'missing' in item.stdout"
      register: import_result
      changed_when: import_result.rc == 0
      run_once: true
      delegate_to: prodesk-node-02

    - name: "Display import results"
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ import_result.results }}"
      when: item.stdout is defined
      run_once: true

    - name: "Attach disk to VM on target node"
      shell: >
        ssh -o StrictHostKeyChecking=no root@{{ item.item.node_ip }}
        "DISK_VOL=\$(qm config {{ item.item.template_id }} | grep unused | awk -F': ' '{print \$2}' | head -1) &&
        qm set {{ item.item.template_id }} --scsi0 \$DISK_VOL &&
        echo disk attached \$DISK_VOL"
      loop: "{{ template_existence.results }}"
      when: "'missing' in item.stdout"
      register: attach_result
      changed_when: "'disk attached' in attach_result.stdout"
      run_once: true
      delegate_to: prodesk-node-02

    - name: "Display disk attach results"
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ attach_result.results }}"
      when: item.stdout is defined
      run_once: true

    - name: "Attach EFI disk on target node"
      shell: >
        ssh -o StrictHostKeyChecking=no root@{{ item.item.node_ip }}
        "qm set {{ item.item.template_id }}
        --efidisk0 {{ item.item.local_storage }}:0,format=raw,efitype=4m,pre-enrolled-keys=0
        && echo efi attached"
      loop: "{{ template_existence.results }}"
      when: "'missing' in item.stdout"
      register: efi_result
      changed_when: "'efi attached' in efi_result.stdout"
      run_once: true
      delegate_to: prodesk-node-02

    - name: "Configure boot order on target node"
      shell: >
        ssh -o StrictHostKeyChecking=no root@{{ item.item.node_ip }}
        "qm set {{ item.item.template_id }} --boot c --bootdisk scsi0
        && echo boot configured"
      loop: "{{ template_existence.results }}"
      when: "'missing' in item.stdout"
      register: boot_result
      changed_when: "'boot configured' in boot_result.stdout"
      run_once: true
      delegate_to: prodesk-node-02

    - name: "Clean up temp image on target node"
      shell: >
        ssh -o StrictHostKeyChecking=no root@{{ item.item.node_ip }}
        "rm -f /tmp/noble-{{ item.item.template_id }}.img
        && echo cleanup done"
      loop: "{{ template_existence.results }}"
      when: "'missing' in item.stdout"
      register: cleanup_result
      changed_when: "'cleanup done' in cleanup_result.stdout"
      run_once: true
      delegate_to: prodesk-node-02

    - name: "Convert to template on target node"
      shell: >
        ssh -o StrictHostKeyChecking=no root@{{ item.item.node_ip }}
        "qm template {{ item.item.template_id }}
        && echo template conversion complete"
      loop: "{{ template_existence.results }}"
      when: "'missing' in item.stdout"
      register: convert_result
      changed_when: "'template conversion complete' in convert_result.stdout"
      run_once: true
      delegate_to: prodesk-node-02

    - name: "Display conversion results"
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ convert_result.results }}"
      when: item.stdout is defined
      run_once: true

    - name: "Verify all templates"
      shell: >
        ssh -o StrictHostKeyChecking=no root@{{ item.node_ip }}
        "qm config {{ item.template_id }} | grep template
        && echo VERIFIED {{ item.template_id }} on {{ item.node }}
        || echo FAILED {{ item.template_id }} on {{ item.node }}"
      loop: "{{ distribution }}"
      register: verify_result
      changed_when: false
      failed_when: false
      run_once: true
      delegate_to: prodesk-node-02

    - name: "Display verification results"
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ verify_result.results }}"
      run_once: true

    - name: "Summary"
      debug:
        msg:
          - "=== Template Distribution Summary ==="
          - "prodesk-node-02: template {{ distribution[0].template_id }}"
          - "legion-node-01:  template {{ distribution[1].template_id }}"
          - "venue-node-03:   template {{ distribution[2].template_id }}"
          - "All templates use local disks"
      run_once: true